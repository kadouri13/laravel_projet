databases:
  - name: laravel_db
    databaseName: laravel_db
    user: laravel_user
    plan: free

services:
  - type: web
    name: laravel_app
    env: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: Laravel
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        value: "base64:8Hg+kbH7JCvnMRbTjIsajPpHPzEkGk30lNjB/9ZC+pE="
      - key: APP_URL
        value: https://laravel_app.onrender.com # Placeholder, automatically works on Render
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: laravel_db
          property: connectionString
